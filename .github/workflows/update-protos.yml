name: Update WAProto

on:
  schedule:
    - cron: '10 1 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-proto:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Fetch WAProto from WhatsApp Web
        id: wa_proto_info
        working-directory: scripts
        run: |
          node index.js > wa-logs.txt
          cat wa-logs.txt
          WA_VERSION=$(cat wa-logs.txt | perl -n -e'/Current version\: (.+)/ && print $1')
          WA_JS_URL=$(cat wa-logs.txt | perl -n -e'/Found source JS URL\: (.+)/ && print $1')
          echo "wa_version=$WA_VERSION" >> $GITHUB_OUTPUT
          echo "wa_js_url=$WA_JS_URL" >> $GITHUB_OUTPUT

      - name: Generate single WAProto/index.js
        working-directory: scripts
        run: node generate-proto.js

      - name: Update baileys-version.json
        run: |
          WA_VERSION="${{steps.wa_proto_info.outputs.wa_version}}"
          WA_NUMBERS=$(echo $WA_VERSION | sed "s/\./, /g")
          echo -e "{\n\t\"version\": [$WA_NUMBERS]\n}" > lib/Defaults/baileys-version.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: updated proto/version to v${{steps.wa_proto_info.outputs.wa_version}}'
          title: 'WhatsApp v${{steps.wa_proto_info.outputs.wa_version}} proto/version update'
          branch: 'update-proto/stable'
          delete-branch: true
          labels: 'update-proto'
          body: |
            Automated WAProto update
            Found source JS URL: ${{steps.wa_proto_info.outputs.wa_js_url}}
            Current version: v${{steps.wa_proto_info.outputs.wa_version}}
          add-paths: |
            WAProto/index.js
            lib/Defaults/baileys-version.json
